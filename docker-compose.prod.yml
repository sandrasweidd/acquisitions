version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acquisitions-app-prod
    ports:
      - '3000:3000'
    env_file:
      - .env.production
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cups: '0.5'
        reservations:
          memory: 265M
          cups: '0.25'

    command: ['node', 'src/index.js']
